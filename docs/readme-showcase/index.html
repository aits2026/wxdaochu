<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VXdaochu README Showcase</title>
  <style>
    :root {
      --bg: #f3f1ec;
      --card: #ffffff;
      --text: #2f2f2f;
      --muted: #666;
      --border: rgba(0, 0, 0, 0.1);
      --primary: #8b7355;
    }

    body[data-theme='dark'] {
      --bg: #1a1816;
      --card: #2a2521;
      --text: #efede7;
      --muted: #b3b0aa;
      --border: rgba(255, 255, 255, 0.15);
      --primary: #c9a86c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toolbar {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .title h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .title p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .viewer {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      padding: 10px;
      flex: 1;
      display: flex;
      min-height: 560px;
    }

    img {
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body data-theme="light">
  <div class="toolbar">
    <div class="title">
      <h1>README 高保真静态复刻预览</h1>
      <p>图像由脚本直接读取真实代码结构后生成（Sidebar/App/Theme）</p>
    </div>
    <div class="controls" id="controls"></div>
  </div>

  <div class="viewer">
    <img id="preview" src="../readme-shots/light-export.svg" alt="preview" />
  </div>

  <div class="meta" id="meta"></div>

  <script>
    const state = {
      theme: 'light',
      panel: 'export'
    }

    const panels = [
      { key: 'export', label: '导出主界面' },
      { key: 'export-selected', label: '导出详情态' },
      { key: 'data', label: '数据管理' },
      { key: 'chat', label: '聊天窗口' },
      { key: 'moments', label: '朋友圈窗口' }
    ]

    const themes = [
      { key: 'light', label: '浅色' },
      { key: 'dark', label: '深色' }
    ]

    function renderControls() {
      const host = document.getElementById('controls')
      host.innerHTML = [
        ...themes.map((item) => `<button class="chip ${state.theme === item.key ? 'active' : ''}" data-type="theme" data-value="${item.key}">${item.label}</button>`),
        ...panels.map((item) => `<button class="chip ${state.panel === item.key ? 'active' : ''}" data-type="panel" data-value="${item.key}">${item.label}</button>`)
      ].join('')

      host.onclick = (event) => {
        const btn = event.target.closest('button[data-type]')
        if (!btn) return
        const type = btn.getAttribute('data-type')
        const value = btn.getAttribute('data-value')
        state[type] = value
        render()
      }
    }

    function render() {
      document.body.setAttribute('data-theme', state.theme)
      renderControls()
      const fileName = `${state.theme}-${state.panel}.svg`
      const src = `../readme-shots/${fileName}`
      const preview = document.getElementById('preview')
      preview.src = src
      preview.alt = fileName

      document.getElementById('meta').textContent = `当前：${fileName}（路径：docs/readme-shots/${fileName}）`
    }

    render()
  </script>
</body>
</html>
